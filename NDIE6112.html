<html lang="en">
<head>
   <meta charset="UTF-8" />

  <title>NDIE 6112 - Nampilin Detail Wilkerstat Express</title>

  <!-- SEO Meta Tags -->
  <meta name="description" content="NDIE 6112 adalah aplikasi pemetaan interaktif berbasis web untuk menampilkan detail wilayah kerja statistik (SLS) secara cepat dan akurat.">
  <meta name="keywords" content="NDIE, Wilkerstat, SLS, Statistik, BPS, Pemetaan, GeoJSON, Leaflet, Kubu Raya">
  <meta name="author" content="Idrus Efendy">

  <!-- Open Graph Meta (untuk sosial media preview) -->
  <meta property="og:title" content="NDIE 6112 - Nampilin Detail Wilkerstat Ekspress">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://idruse.github.io/ndie6112">

  <!-- Turf.js -->
  <script src="https://cdn.jsdelivr.net/npm/@turf/turf@6.5.0/turf.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f7fc;
    }

    header, footer {
      background-color: #5e3a87;
      color: white;
      padding: 1em;
      text-align: center;
      background-image: radial-gradient(circle at top left, rgba(255,255,255,0.1), transparent 70%), radial-gradient(circle at bottom right, rgba(255,255,255,0.05), transparent 70%);
    }

    .search-container {
      text-align: center;
      margin: 1.5em auto;
    }

    .search-container input[type="text"] {
      padding: 0.5em;
      margin: 0.5em 0.25em;
      width: 220px;
      max-width: 80%;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    .search-container button {
      padding: 0.6em 1.2em;
      background-color: #5e3a87;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 0.25em;
    }

    .search-container button:hover {
      background-color: #7a4bb5;
    }

    #map {
      height: 80vh;
      width: 100%;
    }

    .info {
      background: white;
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    /* Legenda styling */
    .legend {
      background: white;
      padding: 8px 12px;
      border-radius: 5px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      font-size: 14px;
      line-height: 1.4em;
      max-width: 200px;
    }

    .legend-title {
      font-weight: bold;
      margin-bottom: 6px;
      text-align: center;
      color: #5e3a87;
    }

    .legend-item {
      cursor: pointer;
      display: flex;
      align-items: center;
      margin-bottom: 4px;
      user-select: none;
    }

    .legend-color-box {
      width: 18px;
      height: 18px;
      margin-right: 8px;
      border-radius: 3px;
      border: 1px solid #ccc;
      flex-shrink: 0;
    }

    .legend-item.disabled .legend-color-box {
      opacity: 0.3;
      border-color: #999;
    }

    .legend-item.disabled {
      color: #999;
    }

    @media screen and (max-width: 600px) {
      .search-container input[type="text"] {
        width: 90%;
      }

      .search-container button {
        width: 90%;
        margin-top: 0.5em;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>NDIE 6112 - Nampilin Detail Wilkerstat Express</h1>
  </header>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="Cari berdasarkan ID SLS...">
    <button onclick="searchFeature()">Cari</button>
    <br>
   <input type="text" id="koordinatInput" placeholder="Lat,Lng contoh: -0.228519, 109.432654">
   <button onclick="searchByKoordinat()">Cari Koordinat</button>
    <button onclick="resetSearch()">Reset</button>
  </div>

  <div id="map"></div>

  <footer>
    <p>&copy; 2025 NDIE 6112 | @idruse</p>
  </footer>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([-0.228519, 109.432654], 10);

     /* OpenStreetMap (OSM) standar
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map); */

     // Google Maps Satellite
const googleSat = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', {
    maxZoom: 20,
    subdomains:['mt0','mt1','mt2','mt3']
}).addTo(map);

    let geojsonLayer;
    let currentHighlighted;
    let markerLatLng;

    const colorsByKecamatan = {

      'RASAU JAYA': '#48c9b0',       // Tosca
      'SUNGAI AMBAWANG': '#f4d03f',  // Kuning
      'SUNGAI KAKAP': '#eb984e',     // Oranye
      'SUNGAI RAYA': '#58d68d',      // Hijau
      'TELUK PAKEDAI': '#aab7b8',    // Abu-abu Kebiruan
      'TERENTANG': '#34495e'         // Biru Gelap/Navy
};

const kodePosByDesa = {

};
    
    const activeKecamatan = {};

    function highlightFeature(layer) {
      if (currentHighlighted) {
        geojsonLayer.resetStyle(currentHighlighted);
      }
      currentHighlighted = layer;
      layer.setStyle({
        color: 'green',
        weight: 3,
        fillOpacity: 0.7
      });
      map.fitBounds(layer.getBounds());
    }

    function resetSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('koordinatInput').value = '';
      if (currentHighlighted) {
        geojsonLayer.resetStyle(currentHighlighted);
        currentHighlighted = null;
      }
      if (markerLatLng) {
        map.removeLayer(markerLatLng);
        markerLatLng = null;
      }
      map.setView([-0.228519,109.432654], 10);
    }

    function onEachFeature(feature, layer) {
      const props = feature.properties;
      const namaDesaBersih = props.nmdesa ? props.nmdesa.trim() : "";
      const kodePos = kodePosByDesa[namaDesaBersih] || "Kode Pos Tidak Terdaftar";
      if (props && props.nmsls) {
        const popupContent = `
          <div class="info">
            <strong>RT/RW:</strong> ${props.nmsls}<br>
            <strong>Kelurahan:</strong> ${props.nmdesa}<br>
            <strong>Kecamatan:</strong> ${props.nmkec}<br>
            <strong>IDSLS:</strong> ${props.idsls}<br>
            <strong>Kode Pos:</strong> ${kodePos}
          </div>
        `;
        layer.bindPopup(popupContent);
        layer.on('mouseover', () => layer.setStyle({ color: 'orange', weight: 2, fillOpacity: 0.5 }));
        layer.on('mouseout', () => {
          if (layer !== currentHighlighted) {
            geojsonLayer.resetStyle(layer);
          }
        });
        layer.on('click', () => layer.openPopup());
      }
    }

    function getPolygonStyle(feature) {
      const kec = feature.properties.nmkec;
      const color = colorsByKecamatan[kec] || '#999999'; 
      const isActive = activeKecamatan[kec] !== false; 
      return {
        color: color,
        weight: 2,
        fillOpacity: isActive ? 0.3 : 0,
        opacity: isActive ? 1 : 0
      };
    }

    const geojsonUrl = 'https://raw.githubusercontent.com/idruse/ndie6112/main/Final_SLS_202516112.geojson';

    fetch(geojsonUrl)
      .then(res => res.json())
      .then(data => {
        data.features.forEach(f => {
          const kec = f.properties.nmkec;
          if (!(kec in activeKecamatan)) activeKecamatan[kec] = true;
        });

        geojsonLayer = L.geoJSON(data, {
          style: getPolygonStyle,
          onEachFeature: onEachFeature
        }).addTo(map);
        window.geojsonData = data;

        addLegend();
      })
      .catch(err => {
        console.error('Gagal memuat GeoJSON:', err);
        alert('Gagal memuat data wilayah.');
      });

    function searchFeature() {
      const input = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!input || !geojsonLayer) return;

      let found = false;
      geojsonLayer.eachLayer(layer => {
        const props = layer.feature.properties;
        if (props.idsls.toLowerCase() === input) {
          highlightFeature(layer);
          layer.openPopup();
          map.flyTo(layer.getBounds().getCenter(), 17, { duration: 1.5 });
          found = true;
        }
      });

      if (!found) alert('ID SLS tidak ditemukan.');
    }

    function searchByKoordinat() {
  const input = document.getElementById('koordinatInput').value.trim();
  const [latStr, lngStr] = input.split(',');

  const lat = parseFloat(latStr);
  const lng = parseFloat(lngStr);

  if (isNaN(lat) || isNaN(lng)) {
    alert("Format koordinat yang benar: -0.228519,109.432654");
    return;
  }

  const point = turf.point([lng, lat]);
  let matchedFeature = null;
  let matchedLayer = null;

  geojsonLayer.eachLayer(layer => {
    const polygon = layer.feature;
    if (turf.booleanPointInPolygon(point, polygon)) {
      matchedFeature = polygon.properties;
      matchedLayer = layer;
    }
  });
 const kodePos = matchedFeature ? (kodePosByDesa[matchedFeature.nmdesa] || "Tidak diketahui") : "-";
  if (markerLatLng) map.removeLayer(markerLatLng);

  let popupContent = `
    <div class="info">
      <strong>Latitude:</strong> ${lat}<br>
      <strong>Longitude:</strong> ${lng}<br><hr>
  `;

  if (matchedFeature) {
    popupContent += `
      <strong>RT/RW:</strong> ${matchedFeature.nmsls}<br>
      <strong>Kelurahan:</strong> ${matchedFeature.nmdesa}<br>
      <strong>Kecamatan:</strong> ${matchedFeature.nmkec}<br>
      <strong>IDSLS:</strong> ${matchedFeature.idsls}<br>
      <strong>Kode pos:</strong> ${kodePos}
    `;
  } else {
    popupContent += `<em>Lokasi tidak berada di dalam Wilkerstat Kabupaten Kubu Raya.</em>`;
  }

  popupContent += `</div>`;

  markerLatLng = L.marker([lat, lng]).addTo(map).bindPopup(popupContent).openPopup();

  if (matchedLayer) highlightFeature(matchedLayer);

  map.flyTo([lat, lng], 17, { duration: 1.5 });
}

    function addLegend() {
      const legend = L.control({ position: 'bottomright' });

      legend.onAdd = function () {
        const div = L.DomUtil.create('div', 'legend');
        div.innerHTML = '<div class="legend-title">Legenda Kecamatan</div>';

        for (const [kec, color] of Object.entries(colorsByKecamatan)) {
          const active = activeKecamatan[kec];
          const item = document.createElement('div');
          item.className = 'legend-item' + (active ? '' : ' disabled');
          item.innerHTML = `
            <div class="legend-color-box" style="background:${color}"></div>${kec}
          `;
          item.onclick = () => {
            activeKecamatan[kec] = !activeKecamatan[kec];
            item.classList.toggle('disabled');
            updatePolygonStyles();
          };
          div.appendChild(item);
        }

        L.DomEvent.disableClickPropagation(div);
        return div;
      };

      legend.addTo(map);
    }

    function updatePolygonStyles() {
      geojsonLayer.eachLayer(layer => {
        geojsonLayer.resetStyle(layer);
      });
    }

  </script>
